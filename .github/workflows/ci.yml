name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.9', '3.10', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r tests/requirements.txt
      - name: Run the full test suite
        run: python -m pytest tests/ -v

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r tests/requirements.txt pytest-cov
      - name: Enforce security-module coverage
        run: |
          python -m pytest tests/ -q \
            --cov=src/claudekit/security \
            --cov-report=term-missing \
            --cov-fail-under=85

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install linters
        run: pip install ruff mypy
      - name: ruff
        run: ruff check src/claudekit scripts
      - name: mypy
        run: mypy src/claudekit --ignore-missing-imports

  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Component counts match the filesystem
        run: python3 scripts/gen-docs.py --check

  dangling-hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Every hook referenced in settings.json exists
        run: |
          python3 - <<'PY'
          import json, re, sys
          from pathlib import Path
          text = Path(".claude/settings.json").read_text()
          json.loads(text)  # must be valid JSON
          refs = set(re.findall(r'\.claude/hooks/([A-Za-z0-9_-]+\.sh)', text))
          missing = [h for h in sorted(refs) if not Path(".claude/hooks", h).exists()]
          if missing:
              print("Dangling hook references in settings.json:", missing)
              sys.exit(1)
          print(f"OK: all {len(refs)} referenced hooks exist.")
          PY

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Check install script
        run: shellcheck install.sh
      - name: Check hook scripts
        run: |
          for f in .claude/hooks/*.sh; do
            echo "Checking $f..."
            shellcheck "$f"
          done

  permission-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: No --dangerously-skip-permissions in shipped assets
        run: |
          # Match actual `claude ... --dangerously-skip-permissions` invocations (not prose
          # that documents the ban). Search shipped assets only, not plan scratch.
          # The single permitted exception is a documented opt-in in loop-start.md.
          hits=$(grep -rnE 'claude[^|]*--dangerously-skip-permissions' \
            .claude/commands .claude/agents .claude/skills .claude/hooks templates \
            2>/dev/null | grep -v "commands/loop-start.md" || true)
          if [ -n "$hits" ]; then
            echo "Forbidden --dangerously-skip-permissions invocation found:"
            echo "$hits"
            exit 1
          fi
          echo "OK: no unsanctioned permission bypass."

  structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify operations scripts
        run: |
          test -f .claude/operations/scripts/validate-config-json.py
          test -f .claude/operations/scripts/execute-json-ops.py
          test -f .claude/operations/scripts/restore-backup.py
          test -f .claude/operations/scripts/shared.py
          test -f .claude/operations/scripts/operations-schema.json
          echo "All operations scripts present"
      - name: Test install script help
        run: bash install.sh --help

  validate-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Validate skills-registry.json
        run: |
          python3 -c "
          import json, sys

          with open('.claude/skills/skills-registry.json') as f:
              registry = json.load(f)

          skill_ids = {s['id'] for s in registry['skills']}
          errors = []

          for agent, skills in registry['agentMapping'].items():
              for skill_id in skills:
                  if skill_id not in skill_ids:
                      errors.append(f'Agent \"{agent}\" references unknown skill \"{skill_id}\"')

          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          else:
              print(f'Registry valid: {len(skill_ids)} skills, {len(registry[\"agentMapping\"])} agents')
          "

  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Install wheel in a clean venv and run console scripts
        run: |
          python -m venv /tmp/ck-smoke
          /tmp/ck-smoke/bin/pip install --upgrade pip
          /tmp/ck-smoke/bin/pip install dist/*.whl
          /tmp/ck-smoke/bin/claudekit --version
          /tmp/ck-smoke/bin/ck --help
      - name: Standalone init+doctor from the wheel (no checkout, no CLAUDEKIT_HOME)
        run: |
          target="$(mktemp -d)"
          # Run from an unrelated dir so only the wheel-bundled assets are found.
          cd /tmp
          env -u CLAUDEKIT_HOME /tmp/ck-smoke/bin/claudekit init "$target" --full --yes
          cd "$target"
          /tmp/ck-smoke/bin/claudekit doctor
          /tmp/ck-smoke/bin/claudekit diff

  install-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install the CLI
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: install.sh into a fresh project, then run doctor
        run: |
          target="$(mktemp -d)"
          bash install.sh "$target" --full --yes
          cd "$target"
          claudekit doctor
