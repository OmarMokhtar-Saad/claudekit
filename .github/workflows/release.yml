name: Release

# Publishing to PyPI uses Trusted Publishing (OIDC) — no API token is stored.
# ONE-TIME SETUP on PyPI before the first release:
#   PyPI -> project "claude-kit" -> Publishing -> add a GitHub trusted publisher:
#     owner: OmarMokhtar-Saad, repo: claudekit,
#     workflow: release.yml, environment: pypi
# (For the very first upload of a brand-new project name, use "pending publisher".)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r tests/requirements.txt

      - name: Run the full test suite
        run: python -m pytest tests/ -v

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # dist/ holds claude_kit-<version>.{whl,tar.gz}
          print-hash: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist/*
